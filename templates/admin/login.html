<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sushiro Admin — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: #F0F2F5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 44px 40px;
      width: 360px;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    .title { font-size: 22px; font-weight: 800; color: #3949AB; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #9E9E9E; margin-bottom: 28px; }
    label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: #757575; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; padding: 13px 16px;
      border: 2px solid #E0E0E0; border-radius: 12px;
      font-family: 'Sarabun', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #3949AB; }
    .error {
      background: #FFEBEE; color: #C62828;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-top: 12px; text-align: left;
    }
    .btn {
      display: block; width: 100%; margin-top: 20px;
      background: #3949AB; color: #fff; border: none;
      border-radius: 12px; padding: 14px;
      font-family: 'Sarabun', sans-serif; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #283593; }
    .back { display: block; margin-top: 16px; font-size: 13px; color: #9E9E9E; text-decoration: none; }
    .back:hover { color: #3949AB; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🔐</div>
    <h1 class="title">Sushiro Admin</h1>
    <p class="subtitle">ระบบจัดการ &amp; แดชบอร์ด</p>

    <form method="POST" action="/admin/login">
      <label>รหัสผ่านผู้ดูแลระบบ</label>
      <input type="password" name="password" placeholder="กรอกรหัสผ่าน…" autofocus required>
      {% if error %}
      <div class="error">⚠️ {{ error }}</div>
      {% endif %}
      <button type="submit" class="btn">เข้าสู่ระบบ →</button>
    </form>

    <a href="/" class="back">← กลับสู่หน้าหลัก</a>
  </div>
</body>
</html>
